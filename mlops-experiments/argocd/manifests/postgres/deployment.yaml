apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow-postgres-postgresql
  namespace: application
  labels:
    app: mlflow-postgres-postgresql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow-postgres-postgresql
  template:
    metadata:
      labels:
        app: mlflow-postgres-postgresql
    spec:
      containers:
        - name: postgresql
          image: postgres:16-alpine
          env:
            - name: POSTGRES_USER
              value: mlflow
            - name: POSTGRES_PASSWORD
              value: mlflowpass
            - name: POSTGRES_DB
              value: mlflow
          ports:
            - containerPort: 5432
              name: tcp
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - mlflow
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - mlflow
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow-postgres-postgresql
  namespace: application
  labels:
    app: mlflow-postgres-postgresql
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
      name: tcp
  selector:
    app: mlflow-postgres-postgresql

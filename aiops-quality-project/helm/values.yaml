replicaCount: 2

image:
  repository: registry.gitlab.com/vorobei/mlops-final-project/aiops-quality-service
  tag: manual-202603221905
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8000

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

env:
  MODEL_PATH: /models/model.pkl
  DRIFT_THRESHOLD: "0.7"
  LOG_LEVEL: INFO
  DRIFT_WEBHOOK_URL: ""

metrics:
  enabled: false
  path: /metrics
  port: 8000

loki:
  enabled: true
  annotations:
    promtail.io/scrape: "true"
    promtail.io/job: "aiops-quality-service"

model:
  existingClaim: ""
  mountPath: /models

serviceAccount:
  create: false
  name: default

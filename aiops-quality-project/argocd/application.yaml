apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aiops-quality-service
  namespace: infra-tools
spec:
  project: default
  source:
    repoURL: https://gitlab.com/vorobei/mlops-final-project.git
    targetRevision: lesson-10
    path: aiops-quality-project/helm
    helm:
      parameters:
        - name: metrics.enabled
          value: "false"
  destination:
    server: https://kubernetes.default.svc
    namespace: aiops
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

stages:
  - test
  - retrain
  - build
  - release

variables:
  IMAGE_NAME: "$CI_REGISTRY_IMAGE/aiops-quality-service"
  HELM_VALUES_FILE: "aiops-quality-project/helm/values.yaml"

retrain-model:
  stage: retrain
  image: python:3.11-slim
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - if: '$CI_PIPELINE_SOURCE == "trigger"'
    - if: '$CI_PIPELINE_SOURCE == "pipeline"'
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
  before_script:
    - pip install --no-cache-dir scikit-learn
  script:
    - MODEL_OUTPUT_PATH=aiops-quality-project/artifacts/model.pkl python aiops-quality-project/model/train.py
  artifacts:
    paths:
      - aiops-quality-project/artifacts/model.pkl
    expire_in: 1 week

build-image:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  needs: ["retrain-model"]
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web" || $CI_PIPELINE_SOURCE == "trigger" || $CI_PIPELINE_SOURCE == "pipeline"'
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
  script:
    - export IMAGE_TAG="${CI_COMMIT_SHORT_SHA}-${CI_PIPELINE_ID}"
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - docker build -f aiops-quality-project/Dockerfile -t "$IMAGE_NAME:$IMAGE_TAG" aiops-quality-project
    - docker push "$IMAGE_NAME:$IMAGE_TAG"
    - echo "IMAGE_TAG=$IMAGE_TAG" >> build.env
  artifacts:
    reports:
      dotenv: build.env

update-helm-chart:
  stage: release
  image: alpine:3.20
  needs: ["build-image"]
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web" || $CI_PIPELINE_SOURCE == "trigger" || $CI_PIPELINE_SOURCE == "pipeline"'
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
  before_script:
    - apk add --no-cache git yq
  script:
    - yq -i '.image.repository = strenv(IMAGE_NAME)' "$HELM_VALUES_FILE"
    - yq -i '.image.tag = strenv(IMAGE_TAG)' "$HELM_VALUES_FILE"
    - git add "$HELM_VALUES_FILE"
    - GIT_AUTHOR_NAME="ci-bot" GIT_AUTHOR_EMAIL="ci-bot@example.com" GIT_COMMITTER_NAME="ci-bot" GIT_COMMITTER_EMAIL="ci-bot@example.com" git commit -m "ci: update helm image tag to $IMAGE_TAG" || echo "No changes to commit"
    - git push origin "$CI_COMMIT_BRANCH"
